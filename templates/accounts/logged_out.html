    {% extends "base_auth.html" %}
    {% load i18n %}

    {% block title %}{% translate "Đã đăng xuất" %}{% endblock %}

    {% block content %}
    <div class="min-h-screen bg-gradient-to-br from-blue-100 via-indigo-50 to-purple-100 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-white py-8 px-4 shadow-xl rounded-lg sm:px-10 text-center">
                <svg class="mx-auto h-12 w-auto text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h2 class="mt-6 text-2xl font-bold tracking-tight text-gray-900">
                    {% translate "Bạn đã đăng xuất thành công!" %}
                </h2>
                <p class="mt-2 text-sm text-gray-600">
                    {% translate "Cảm ơn bạn đã sử dụng hệ thống." %}
                </p>
                <div class="mt-6">
                    <a href="{% url 'login' %}"
                       class="w-full flex items-center justify-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        {% translate "Đăng nhập lại" %}
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}
